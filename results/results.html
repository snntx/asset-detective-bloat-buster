<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asset Detective – Results</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="stylesheet" href="results.css" />
</head>
<body>
  <div class="page-wrap">
    <!-- Sidebar nav -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="7" stroke="#6366f1" stroke-width="2"/>
          <path d="M16.5 16.5L21 21" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M8 11h6M11 8v6" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Asset Detective</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn active" data-view="results">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Results
        </button>
        <button class="nav-btn" data-view="history">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>
          History
        </button>
      </nav>

      <!-- Summary stats (shown when results loaded) -->
      <div class="sidebar-stats" id="sidebarStats" style="display:none">
        <hr class="divider" />
        <div class="stat-block">
          <span class="stat-value" id="statTotal">—</span>
          <span class="stat-label">Total assets</span>
        </div>
        <div class="stat-block">
          <span class="stat-value relevant" id="statRelevant">—</span>
          <span class="stat-label">Relevant</span>
        </div>
        <div class="stat-block">
          <span class="stat-value partial" id="statPartial">—</span>
          <span class="stat-label">Partial</span>
        </div>
        <div class="stat-block">
          <span class="stat-value irrelevant" id="statIrrelevant">—</span>
          <span class="stat-label">Irrelevant</span>
        </div>
        <hr class="divider" />
        <div class="stat-block bloat">
          <span class="stat-value accent" id="statBloat">—</span>
          <span class="stat-label">Total bloat</span>
        </div>
        <div class="stat-block">
          <span class="stat-value" id="statSavings">—</span>
          <span class="stat-label">Potential saving</span>
        </div>
        <!-- Path filter -->
        <div id="pathFilterWrap" style="display:none">
          <hr class="divider" />
          <p class="section-title" style="margin-bottom:6px">Filter by path</p>
          <button class="path-chip path-chip-active" id="pathChipAll" data-path="">All paths</button>
          <div id="pathChipList"></div>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <!-- Results view -->
      <div id="viewResults">
        <!-- Toolbar -->
        <div class="toolbar" id="toolbar" style="display:none">
          <div class="toolbar-left">
            <h1 class="page-title">Scan Results</h1>
            <span class="scan-meta" id="scanMeta"></span>
          </div>
          <div class="toolbar-right">
            <div class="filter-tabs" id="filterTabs">
              <button class="filter-tab active" data-filter="all">All</button>
              <button class="filter-tab" data-filter="css">CSS</button>
              <button class="filter-tab" data-filter="js">JS</button>
            </div>
            <input class="search-input" id="searchInput" type="search" placeholder="Search name or path…" />
            <button class="btn-secondary" id="exportBtn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Export JSON
            </button>
          </div>
        </div>

        <!-- Page info banner -->
        <div class="page-info-banner" id="pageInfoBanner" style="display:none">
          <span id="bannerUrl"></span>
          <div class="banner-tags" id="bannerTags"></div>
        </div>

        <!-- Asset sections -->
        <div id="assetSections"></div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/>
          </svg>
          <h2>No scan results</h2>
          <p>Open the extension popup and click <strong>Start Scan</strong> on the page you want to analyse.</p>
        </div>
      </div>

      <!-- History view -->
      <div id="viewHistory" style="display:none">
        <div class="toolbar">
          <div class="toolbar-left">
            <h1 class="page-title">Scan History</h1>
          </div>
          <div class="toolbar-right">
            <button class="btn-secondary" id="clearHistoryBtn">Clear history</button>
          </div>
        </div>
        <div id="historyList"></div>
        <div class="empty-state" id="historyEmpty" style="display:none">
          <p>No scan history yet.</p>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="results.js"></script>
</body>
</html>
